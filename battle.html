<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="icon" href="assets/pokeball.svg" type="image/png">
  <title>Batalha Pokemon</title>

  <link rel="stylesheet" href="battle.css">
  <script src="battle.js" defer></script>
</head>

<body>
  <main class="gameboy">
    <section class="battle-screen" aria-label="Campo de batalha">
      <div class="enemy">
        <div class="status-box">
          <div class="status-header">
            <p id="enemy-name">----</p>
            <span id="enemy-level">Lv. ?</span>
          </div>
          <div class="hp-label">HP</div>
          <div class="hp-bar">
            <div id="enemy-hp" class="hp"></div>
          </div>
          <p id="enemy-hp-text" class="hp-text">100/100</p>
        </div>

        <div class="sprite-wrap">
          <img id="enemy-img" alt="Pokemon inimigo">
          <span class="shadow"></span>
        </div>
      </div>

      <div class="player">
        <div class="sprite-wrap">
          <img id="player-img" alt="Pokemon do jogador">
          <span class="shadow"></span>
        </div>

        <div class="status-box">
          <div class="status-header">
            <p id="player-name">----</p>
            <span id="player-level">Lv. ?</span>
          </div>
          <div class="hp-label">HP</div>
          <div class="hp-bar">
            <div id="player-hp" class="hp"></div>
          </div>
          <p id="player-hp-text" class="hp-text">100/100</p>
        </div>
      </div>
    </section>

    <section class="dialog-box" aria-label="Comandos da batalha">
      <p id="battle-log">Carregando batalha...</p>

      <div id="actions" class="actions">
        <button class="attack-btn" data-attack="0" type="button">----</button>
        <button class="attack-btn" data-attack="1" type="button">----</button>
        <button class="attack-btn" data-attack="2" type="button">----</button>
        <button class="attack-btn" data-attack="3" type="button">----</button>
      </div>

      <div class="extra-actions">
        <button id="restart-btn" class="secondary-btn" type="button" hidden>Jogar de novo</button>
        <a class="secondary-link" href="selecao.html">Trocar time</a>
      </div>
    </section>
  </main>
</body>
</html>
